name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  drizzle-check:
    name: Drizzle Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Plan 03 adds drizzle-kit + drizzle/schema.ts + drizzle/migrations/.
      # Until then this step is a no-op guard: skip gracefully if drizzle.config is absent.
      - name: Check Drizzle migrations match schema
        run: |
          if [ -f drizzle.config.ts ]; then
            npx drizzle-kit check
          else
            echo "drizzle.config.ts not present yet (added by plan 01-03). Skipping drizzle-kit check."
          fi

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    if: ${{ vars.E2E_ENABLED == 'true' }}
    env:
      DATABASE_URL: ${{ secrets.PLAYWRIGHT_TEST_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.PLAYWRIGHT_ENCRYPTION_KEY }}
      BETTER_AUTH_SECRET: ${{ secrets.PLAYWRIGHT_BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3000
      OWNER_EMAIL: owner-e2e@example.test
      OWNER_PASSWORD: TestPassword123!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Apply migrations to test DB
        run: npm run db:migrate
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
